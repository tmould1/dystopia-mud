name: Release (Linux)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v1.0.0). Leave empty to build without releasing.'
        type: string
        default: ''

jobs:
  build:
    name: Build (Linux)
    runs-on: ubuntu-latest
    container:
      image: amazonlinux:2023
    steps:
      - name: Install dependencies
        run: yum install -y gcc make zlib-devel libxcrypt-devel tar gzip

      - uses: actions/checkout@v4

      - name: Generate Makefile and Build
        run: |
          cd game
          chmod +x build/GenerateProjectFiles.sh
          bash build/GenerateProjectFiles.sh
          cd build
          make -j$(nproc) -f Makefile

      - name: Run tests
        run: |
          cd game/tests
          make clean && make
          ./run_tests

      - name: Package release
        run: |
          mkdir -p release/dystopia
          cp -r gamedata release/dystopia/
          cp startup.sh release/dystopia/
          chmod +x release/dystopia/startup.sh
          cp README.md release/dystopia/ 2>/dev/null || true
          cd release
          tar -czvf ../dystopia-linux-amd64.tar.gz dystopia/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dystopia-linux-amd64
          path: dystopia-linux-amd64.tar.gz

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.tag != ''
    permissions:
      contents: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: dystopia-linux-amd64

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          fi

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Dystopia MUD ${{ steps.tag.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: dystopia-linux-amd64.tar.gz
